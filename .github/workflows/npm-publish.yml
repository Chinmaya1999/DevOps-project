name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  # Build and Push Docker Images
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            awsmallick1999/infrapilot-backend:latest
            awsmallick1999/infrapilot-backend:${{ github.sha }}
          cache-from: type=registry,ref=awsmallick1999/infrapilot-backend:buildcache
          cache-to: type=registry,ref=awsmallick1999/infrapilot-backend:buildcache,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            awsmallick1999/infrapilot-frontend:latest
            awsmallick1999/infrapilot-frontend:${{ github.sha }}
          cache-from: type=registry,ref=awsmallick1999/infrapilot-frontend:buildcache
          cache-to: type=registry,ref=awsmallick1999/infrapilot-frontend:buildcache,mode=max

  # Deploy to AWS EC2
  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Use ec2-user's home directory instead of root
            PROJECT_DIR="/home/ec2-user/DevOps-project"
            
            # Check if project exists, if not clone it
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Project directory not found. Cloning repository..."
              cd /home/ec2-user
              git clone https://github.com/Chinmaya1999/DevOps-project.git
            fi
            
            # Navigate to project directory
            cd $PROJECT_DIR || exit 1
            
            # Pull latest changes
            git pull origin main
            
            # Stop and remove old containers
            sudo docker-compose down
            
            # Pull latest images
            sudo docker pull awsmallick1999/infrapilot-backend:latest
            sudo docker pull awsmallick1999/infrapilot-frontend:latest
            
            # Create .env file from GitHub secret
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Start containers
            sudo docker-compose up -d
            
            # Clean up unused images
            sudo docker image prune -f
            
            # Check container status
            sudo docker ps

  # Health Check
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check backend health
        uses: jtalk/url-health-check-action@v3
        with:
          url: "http://${{ secrets.EC2_HOST }}:5001"
          max-attempts: 5
          retry-delay: 10s

      - name: Check frontend health
        uses: jtalk/url-health-check-action@v3
        with:
          url: "http://${{ secrets.EC2_HOST }}:3000"
          max-attempts: 5
          retry-delay: 10s

  # Rollback
  rollback:
    needs: [deploy, health-check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Rollback deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            PROJECT_DIR="/home/ec2-user/DevOps-project"
            cd $PROJECT_DIR
            sudo docker-compose down
            # Pull previous stable versions if tagged
            sudo docker pull awsmallick1999/infrapilot-backend:previous || echo "No previous version found"
            sudo docker pull awsmallick1999/infrapilot-frontend:previous || echo "No previous version found"
            sudo docker-compose up -d
